<script>
// ==============================================================================
// FILE: JS_Auth.html
// DESKRIPSI: Modul Layar Login dan Autentikasi (Anti-Fraud Device Binding)
// ==============================================================================

function renderView_Login() {
    DOM_Engine.clear('sys-root');
    const root = document.getElementById('sys-root');
    
    // Membungkus seluruh layar dengan aurora background
    const container = DOM_Engine.create('div', 'min-h-screen w-full flex bg-aurora', {});

    const bgLeft = DOM_Engine.create('div', 'hidden lg:flex lg:w-1/2 flex-col justify-center items-center p-12 relative overflow-hidden', {}, [
        DOM_Engine.create('div', 'absolute w-96 h-96 bg-indigo-500/20 rounded-full blur-3xl -top-10 -left-10 animate-pulse'),
        DOM_Engine.create('div', 'absolute w-96 h-96 bg-emerald-400/20 rounded-full blur-3xl bottom-10 right-10 animate-float'),
        
        DOM_Engine.create('div', 'relative z-10 text-center glass-dark p-12 rounded-[3rem] shadow-2xl border border-white/10 max-w-lg', {}, [
            DOM_Engine.create('div', 'w-24 h-24 bg-white/10 backdrop-blur-md rounded-3xl flex items-center justify-center mx-auto mb-8 border border-white/20 shadow-[0_0_40px_rgba(255,255,255,0.1)]', {}, [DOM_Engine.create('i', 'fa-solid fa-shield-halved text-5xl text-emerald-400')]),
            DOM_Engine.create('h1', 'text-5xl font-extrabold mb-4 tracking-tight text-white', {}, ['C.E.P.U']),
            DOM_Engine.create('h2', 'text-xl font-bold mb-6 text-indigo-400 tracking-widest uppercase', {}, ['Catatan Evaluasi Pekerja Utama']),
            DOM_Engine.create('p', 'text-slate-300 text-base leading-relaxed font-medium', {}, ['Kendalikan seluruh operasional dengan protokol anti-fraud tingkat militer dan eksekusi secepat kilat.'])
        ])
    ]);

    const inpNRPP = DOM_Engine.create('div', 'relative', {}, [
        DOM_Engine.create('i', 'fa-solid fa-id-badge absolute left-5 top-4 text-slate-400 text-lg'),
        DOM_Engine.create('input', 'input-premium w-full bg-white/70 border border-slate-200 rounded-2xl pl-12 pr-4 py-4 text-slate-800 font-bold focus:bg-white', { type: 'text', id: 'auth-inp-nrpp', placeholder: 'Masukkan NRPP', required: 'true', autocomplete: 'off' })
    ]);
    
    const inpPass = DOM_Engine.create('div', 'relative', {}, [
        DOM_Engine.create('i', 'fa-solid fa-lock absolute left-5 top-4 text-slate-400 text-lg'),
        DOM_Engine.create('input', 'input-premium w-full bg-white/70 border border-slate-200 rounded-2xl pl-12 pr-4 py-4 text-slate-800 focus:bg-white', { type: 'password', id: 'auth-inp-pass', placeholder: 'Kata Sandi Akses', required: 'true' })
    ]);
    
    const btnSubmit = DOM_Engine.create('button', 'btn-glow-indigo w-full text-white py-4 px-4 rounded-2xl font-bold text-lg mt-6 flex items-center justify-center gap-3 transition-transform shadow-md', { type: 'submit', id: 'auth-btn-submit' }, ['Otorisasi Akses ', DOM_Engine.create('i', 'fa-solid fa-arrow-right-to-bracket')]);

    // [FITUR BARU]: Tombol Reset Cache
    const btnResetCache = DOM_Engine.create('button', 'group w-full py-3 mt-4 border border-slate-200 text-slate-500 hover:bg-rose-50 hover:text-rose-600 hover:border-rose-200 rounded-2xl text-xs font-bold transition-all flex items-center justify-center gap-2 shadow-sm bg-slate-50/80 backdrop-blur-sm', {
        type: 'button',
        onClick: action_showResetCacheModal
    }, [
        DOM_Engine.create('i', 'fa-solid fa-broom text-slate-400 transition-colors group-hover:text-rose-500'),
        'Masalah Login? Bersihkan Cache'
    ]);

    const form = DOM_Engine.create('form', 'w-full max-w-sm glass p-10 rounded-[2rem] shadow-premium relative z-10 border border-white/50 fade-in-up', { onSubmit: handleAction_Login }, [
        DOM_Engine.create('div', 'text-center mb-8', {}, [
            DOM_Engine.create('h2', 'text-3xl font-extrabold text-slate-800 mb-2 tracking-tight', {}, ['Selamat Datang']),
            DOM_Engine.create('p', 'text-slate-500 text-sm font-semibold', {}, ['Verifikasi identitas perangkat Anda.'])
        ]),
        DOM_Engine.create('div', 'space-y-5 mb-2', {}, [inpNRPP, inpPass]),
        btnSubmit,
        btnResetCache // <-- Masukkan tombol ke dalam form
    ]);

    const bgRight = DOM_Engine.create('div', 'w-full lg:w-1/2 flex items-center justify-center p-8 relative', {}, [
        DOM_Engine.create('div', 'absolute inset-0 bg-[url("data:image/svg+xml,%3Csvg width=\'20\' height=\'20\' viewBox=\'0 0 20 20\' xmlns=\'http://www.w3.org/2000/svg\'%3E%3Cg fill=\'%2394a3b8\' fill-opacity=\'0.1\' fill-rule=\'evenodd\'%3E%3Ccircle cx=\'3\' cy=\'3\' r=\'3\'/%3E%3Cg/%3E%3C/svg%3E")] opacity-50'),
        form
    ]);
    
    container.appendChild(bgLeft);
    container.appendChild(bgRight);
    root.appendChild(container);
}

function handleAction_Login(e) {
    e.preventDefault();
    const nrpp = document.getElementById('auth-inp-nrpp').value;
    const pass = document.getElementById('auth-inp-pass').value;
    const btn = document.getElementById('auth-btn-submit');
    const deviceId = sysGetDeviceId(); 
    
    btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Memverifikasi...';
    btn.disabled = true;

    google.script.run
        .withSuccessHandler((res) => {
            if (res.status === "success") {
                sysShowToast("Akses Diterima! Perangkat Tervalidasi.", "success");
                SysState.user = res.data;
                localStorage.setItem('cepu_session', JSON.stringify(res.data));
                renderView_MainLayout();
            } else {
                sysShowToast(res.message, "error");
                btn.innerHTML = 'Otorisasi Akses <i class="fa-solid fa-arrow-right-to-bracket"></i>';
                btn.disabled = false;
            }
        })
        .withFailureHandler(() => {
            sysShowToast("Gagal terhubung ke server ERP.", "error");
            btn.innerHTML = 'Otorisasi Akses <i class="fa-solid fa-arrow-right-to-bracket"></i>';
            btn.disabled = false;
        })
        .api_verifyLogin(nrpp, pass, deviceId); 
}

function handleAction_Logout() {
    localStorage.removeItem('cepu_session');
    localStorage.removeItem('cepu_dinas_state'); 
    SysState.user = null;
    SysState.dinas.isActive = false;
    SysState.dinas.data = null;
    renderView_Login();
}

// ==========================================================
// MODAL ELEGAN: RESET CACHE & DEVICE ID (v1.2.7 STABLE)
// ==========================================================
function action_showResetCacheModal() {
    const modalId = "modal-reset-cache";

    // Fungsi Internal untuk Eksekusi Reset
    const executeHardReset = () => {
        const btn = document.querySelector("#btn-confirm-reset");
        if (btn) {
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Mereset...';
            btn.disabled = true;
        }

        // 1. Bersihkan Storage Lokal
        localStorage.clear();
        sessionStorage.clear();

        // 2. Tarik URL Segar dari Server
        google.script.run
            .withSuccessHandler(function(freshUrl) {
                if (window.top && window.top.location) {
                    window.top.location.replace(freshUrl);
                } else {
                    window.location.replace(freshUrl);
                }
            })
            .withFailureHandler(function() {
                // Fallback terakhir jika API gagal
                window.location.reload(true);
            })
            .api_getScriptUrl();
    };

    // Tombol Batal
    const btnCancel = DOM_Engine.create("button", "w-full sm:w-auto px-5 py-2.5 text-sm font-bold text-slate-500 hover:bg-slate-100 rounded-xl transition-colors", { 
        type: "button", 
        onClick: () => {
            const m = document.getElementById(modalId);
            if(m) m.remove();
        } 
    }, ["Batal"]);

    // Tombol Konfirmasi (Merah) - HANYA TIMPA BAGIAN INI DI JS_Auth.html
    const btnConfirm = DOM_Engine.create('button', 'w-full sm:w-auto px-5 py-2.5 text-sm font-bold text-white bg-rose-500 hover:bg-rose-600 rounded-xl shadow-md flex items-center justify-center gap-2 transition-all hover:-translate-y-0.5', {
        type: 'button',
        id: 'modal-btn-confirm-reset',
        onClick: function() {
            const btn = document.getElementById('modal-btn-confirm-reset');
            if (btn) {
                btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Mereset...';
                btn.disabled = true;
            }

            // 1. [KUNCI ANTI-SECURITY LOCK]: Selamatkan Device ID dan Versi Aplikasi!
            const savedDeviceId = localStorage.getItem('cepu_device_id');
            const savedVersion = typeof APP_VERSION !== 'undefined' ? APP_VERSION : localStorage.getItem('cepu_app_version');

            // 2. Bersihkan Storage (Menghapus sesi error/nyangkut)
            localStorage.clear();
            sessionStorage.clear();

            // 3. Kembalikan data vital agar tidak diblokir Anti-Fraud dan layar tidak Blank
            if (savedDeviceId) localStorage.setItem('cepu_device_id', savedDeviceId);
            if (savedVersion) localStorage.setItem('cepu_app_version', savedVersion);

            // 4. Lakukan pengalihan (Redirect) dengan aman
            setTimeout(function() {
                google.script.run
                    .withSuccessHandler(function(url) {
                        const finalUrl = url + "?v=" + new Date().getTime();
                        window.open(finalUrl, '_top'); 
                    })
                    .withFailureHandler(function() {
                        window.location.reload(true);
                    })
                    .api_getScriptUrl();
            }, 300);
        }
    }, [DOM_Engine.create('i', 'fa-solid fa-trash-can'), 'Ya, Bersihkan']);

    // Konten Modal
    const modalContent = DOM_Engine.create("div", "bg-white rounded-[2rem] shadow-2xl w-full max-w-sm overflow-hidden transform transition-all p-8 text-center relative border border-slate-100", {}, [
        DOM_Engine.create("div", "w-20 h-20 bg-rose-50 border border-rose-100 rounded-full flex items-center justify-center mx-auto mb-5", {}, [
            DOM_Engine.create("i", "fa-solid fa-triangle-exclamation text-4xl text-rose-500 animate-pulse")
        ]),
        DOM_Engine.create("h3", "font-extrabold text-slate-800 text-2xl mb-2", {}, ["Reset Sistem?"]),
        DOM_Engine.create("p", "text-sm text-slate-500 mb-8 leading-relaxed", {}, [
            "Tindakan ini menghapus seluruh cache versi lama. Gunakan jika layar ",
            DOM_Engine.create("span", "font-bold text-rose-600", {}, ["blank atau stuck"]),
            " pada versi lama."
        ]),
        DOM_Engine.create("div", "flex flex-col sm:flex-row justify-center gap-3", {}, [btnCancel, btnConfirm])
    ]);

    // Overlay
    const modalOverlay = DOM_Engine.create("div", "fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[150] flex items-center justify-center p-4", { id: modalId }, [modalContent]);
    document.body.appendChild(modalOverlay);
}
</script>
