function toggleSidebar() {
    SysState.ui.sidebarOpen = !SysState.ui.sidebarOpen;
    document.getElementById('nav-sidebar').classList.toggle('-translate-x-full');
    const overlay = document.getElementById('nav-overlay');

    overlay.classList.toggle('pointer-events-none');

function sysNavigateTo(workspaceFunc, activeId) {
    // 1. Auto-Tutup sidebar jika digunakan di layar HP
    if (window.innerWidth < 1024 && SysState.ui.sidebarOpen) {
        toggleSidebar();
    }
    
    // 2. Eksekusi fungsi perubahan halaman
    if(typeof workspaceFunc === 'function') workspaceFunc();

    // 3. Modifikasi warna menu (Active State Manager)
    sysUpdateActiveMenu(activeId);
}

function sysUpdateActiveMenu(activeId) {
  const menuIds = ['menu-dinas', 'menu-log-pribadi', 'menu-cetak-deklarasi', 'menu-master', 'menu-karyawan', 'menu-live-tracking', 'menu-approval', 'menu-rekap'];

    menuIds.forEach(id => {
        const el = document.getElementById(id);
        if (!el) return;

        const iconEl = el.querySelector('i');

        if (id === activeId) {
            // Berikan warna Gradasi Biru Bercahaya untuk Menu yang Aktif
            el.className = 'sys-menu-item flex items-center gap-4 px-6 py-4 mx-4 rounded-2xl font-bold bg-gradient-to-r from-indigo-600 to-blue-600 text-white shadow-lg shadow-indigo-500/30 cursor-pointer transition-transform hover:-translate-y-1 mt-2';
            if (iconEl) iconEl.classList.remove('text-slate-400', 'group-hover:text-indigo-500', 'transition-colors');
        } else {
            // Berikan warna transparan untuk Menu yang tidak aktif
            el.className = 'sys-menu-item flex items-center gap-4 px-6 py-3.5 mx-4 rounded-2xl font-semibold text-slate-600 hover:bg-indigo-50 hover:text-indigo-600 cursor-pointer mt-2 transition-all group border border-transparent hover:border-indigo-100';
            if (iconEl) iconEl.classList.add('text-slate-400', 'group-hover:text-indigo-500', 'transition-colors');
        }
    });
}

function renderWorkspace_Dinas() {
    DOM_Engine.clear('nav-workspace');
    const container = document.getElementById('nav-workspace');

    if (SysState.dinas.isActive) {
        container.appendChild(buildCard_ActiveDinas());
        SysState.dinas.isLocValid = false; 
        SysState.dinas.isBarcodeValid = false;
        action_getGPS('dinas-txt-gps-pulang', 'dinas-icn-gps-pulang');
    } else {
        container.appendChild(DOM_Engine.create('div', 'flex flex-col items-center py-12', {}, [
            DOM_Engine.create('i', 'fa-solid fa-circle-notch fa-spin text-3xl text-blue-600 mb-4'),
            DOM_Engine.create('p', 'text-slate-500 font-medium', {}, ['Mempersiapkan Form & Riwayat...'])
        ]));

        google.script.run
            .withSuccessHandler((res) => {
                DOM_Engine.clear('nav-workspace');
                if (res.status === "success") {
                    
                    // [UPDATE KILLER FIX]: Deteksi Active Trip Langsung dari Server!
                    if (res.data.activeTrip) {
                        SysState.dinas.isActive = true;
                        SysState.dinas.data = res.data.activeTrip;
                        localStorage.setItem('cepu_dinas_state', JSON.stringify(res.data.activeTrip));
                        renderWorkspace_Dinas(); // Putar balik render menjadi Mode Aktif
                        return;
                    }

                    const userRole = SysState.user.jabatan.toUpperCase();
                    const userLoc = SysState.user.lokasi.toUpperCase();
                    
                    if (userRole === 'SALES' || userLoc === 'SALES') {
                        container.appendChild(buildForm_Sales(res.data));
                    } else {
                        container.appendChild(buildForm_NewDinas(res.data));
                    }
                    
                    action_getGPS('dinas-txt-gps', 'dinas-icn-gps');
                } else {
                    sysShowToast("Gagal memuat data: " + res.message, "error");
                }
            })
            .api_getInitFormData(SysState.user); 
    }
}

function checkEligibility_Berangkat() {
    const btn = document.getElementById('dinas-btn-submit');
    if (btn && SysState.dinas.isLocValid && SysState.dinas.isBarcodeValid) {
        btn.removeAttribute('disabled'); btn.classList.remove('opacity-50', 'cursor-not-allowed');
    }
}

function checkEligibility_Pulang() {
    const btn = document.getElementById('dinas-btn-pulang');
    // [UPDATE] Tambahan cek isBarcodeValid
    if (btn && SysState.dinas.isLocValid && SysState.dinas.isBarcodeValid) {
        btn.removeAttribute('disabled'); btn.classList.remove('opacity-50', 'cursor-not-allowed');
    }
}

function action_getGPS(textId, iconId) {
    if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
            (pos) => {
                SysState.dinas.kordinat = `${pos.coords.latitude}, ${pos.coords.longitude}`;
                SysState.dinas.isLocValid = true;
                const txtGps = document.getElementById(textId);
                if(txtGps) {
                    txtGps.textContent = `Akurasi: ${pos.coords.accuracy.toFixed(1)}m`;
                    txtGps.className = 'text-sm font-semibold text-emerald-600';
                    document.getElementById(iconId).className = "fa-solid fa-location-dot text-emerald-500 text-lg";
                }
                if(SysState.dinas.isActive) checkEligibility_Pulang(); else checkEligibility_Berangkat();
            },
            () => { sysShowToast("GPS gagal/ditolak.", "error"); }, { enableHighAccuracy: true }
        );
    }
}

let localHtml5QrCode = null;

function switchScannerTab(tab) {
    const tC = document.getElementById('dinas-tab-cam'), tF = document.getElementById('dinas-tab-file');
    const aC = document.getElementById('dinas-area-cam'), aF = document.getElementById('dinas-area-file');

    if (tab === 'cam') {
        tC.className = "flex-1 py-3 text-sm font-semibold border-b-2 border-blue-600 text-blue-600";
        tF.className = "flex-1 py-3 text-sm font-semibold border-b-2 border-transparent text-slate-500";
        aC.classList.remove('hidden'); aF.classList.add('hidden'); action_startCamera();
    } else {
        tF.className = "flex-1 py-3 text-sm font-semibold border-b-2 border-blue-600 text-blue-600";
        tC.className = "flex-1 py-3 text-sm font-semibold border-b-2 border-transparent text-slate-500";
        aF.classList.remove('hidden'); aC.classList.add('hidden');
        if (localHtml5QrCode && localHtml5QrCode.isScanning) { localHtml5QrCode.stop().catch(()=>{}); }
    }
}

function action_openScanner() {
    const m = document.getElementById('dinas-modal'); const mc = document.getElementById('dinas-modal-content');
    m.classList.remove('hidden'); void m.offsetWidth; m.classList.remove('opacity-0'); mc.classList.remove('scale-95');
    if (!localHtml5QrCode) localHtml5QrCode = new Html5Qrcode("dinas-reader");
    switchScannerTab('cam');
}

function action_startCamera() {
    if (!localHtml5QrCode || localHtml5QrCode.isScanning) return;
    Html5Qrcode.getCameras().then(devices => {
        if (devices && devices.length) {
            let cameraId = devices[0].id; 
            for (let i = 0; i < devices.length; i++) {
                if (devices[i].label.toLowerCase().includes("back") || devices[i].label.toLowerCase().includes("belakang")) { cameraId = devices[i].id; break; }
            }
            localHtml5QrCode.start(cameraId, { fps: 10, qrbox: 250 }, processScanResult, () => {}).catch(() => { switchScannerTab('file'); });
        } else { switchScannerTab('file'); }
    }).catch(() => { switchScannerTab('file'); });
}

function action_processImageFile(e) {
    if (e.target.files.length == 0) return;
    if (!localHtml5QrCode) localHtml5QrCode = new Html5Qrcode("dinas-reader");
    sysShowToast("Memproses gambar...", "info");
    localHtml5QrCode.scanFile(e.target.files[0], true)
        .then(decodedText => { processScanResult(decodedText); })
        .catch(() => { sysShowToast("Barcode tidak ditemukan.", "error"); });
    e.target.value = ""; 
}

function processScanResult(decodedText) {
    if (decodedText === "POS-SECURITY-FSET-01") {
        action_closeScanner(); SysState.dinas.isBarcodeValid = true;
        const txtBarcode = document.getElementById('dinas-txt-barcode');
        if (txtBarcode) {
            txtBarcode.className = "text-sm text-emerald-600 font-bold mt-2 mb-4";
            txtBarcode.innerHTML = '<i class="fa-solid fa-check-circle"></i> Barcode Valid (POS-SECURITY-FSET-01)';
        }
        // [UPDATE] Cek trigger berdasarkan mode aktif (Pulang atau Berangkat)
        if (SysState.dinas.isActive) checkEligibility_Pulang(); 
        else checkEligibility_Berangkat();
        
        sysShowToast("Barcode Diterima", "success");
    } else { sysShowToast("Barcode Salah!", "error"); }
}

function action_closeScanner() {
    const m = document.getElementById('dinas-modal'); const mc = document.getElementById('dinas-modal-content');
    m.classList.add('opacity-0'); mc.classList.add('scale-95');
    setTimeout(() => { m.classList.add('hidden'); if (localHtml5QrCode && localHtml5QrCode.isScanning) { localHtml5QrCode.stop().catch(()=>{}); } }, 300);
}

function action_submitDinas(e) {
    e.preventDefault();
    if (!SysState.dinas.isLocValid || !SysState.dinas.isBarcodeValid) return;
    const btn = document.getElementById('dinas-btn-submit');
    btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Memproses Keberangkatan...'; btn.disabled = true;

    // [UPDATE LOGIKA ST]: Deteksi kosong atau teks menyusul
    let inputST = document.getElementById('dinas-inp-nost').value.trim();
    if (inputST === "" || inputST === "TIDAK ADA NO ST" || inputST === "ST MENYUSUL") {
        inputST = "BELUM ADA NO ST"; // Pastikan string bersih tanpa kutip
    }

    const payload = { 
      noST: inputST, 
      customer: document.getElementById('dinas-inp-cust').value, 
      lokasi: document.getElementById('dinas-inp-lokasi').value, 
      kordinat: SysState.dinas.kordinat,
      statusAbsensi: document.getElementById('dinas-sel-status').value
    };

    google.script.run
        .withSuccessHandler((res) => {
            if(res.status === "success") { 
                sysShowToast("Berangkat! Hati-hati.", "success"); 
                SysState.dinas.isActive = true; 
                SysState.dinas.data = res.data; 
                localStorage.setItem('cepu_dinas_state', JSON.stringify(res.data));
                renderWorkspace_Dinas(); 
            } else { sysShowToast(res.message, "error"); btn.innerHTML = 'Mulai Perjalanan'; btn.disabled = false; }
        })
        .api_submitPerjalananDinas(payload, SysState.user);
}


function action_submitPulang() {
    // [UPDATE] Penolakan jika barcode belum discan
    if (!SysState.dinas.isLocValid || !SysState.dinas.isBarcodeValid) return;
    
    const btn = document.getElementById('dinas-btn-pulang');
    btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Proses Kepulangan...'; btn.disabled = true;

    const payload = { idTransaksi: SysState.dinas.data.idTransaksi, kordinatMasuk: SysState.dinas.kordinat };

    google.script.run
        .withSuccessHandler((res) => {
            if(res.status === "success") { 
                sysShowToast(`Selesai! Durasi: ${res.data.durasi} Jam | UPD: Rp${res.data.nominal}`, "success"); 
                SysState.dinas.isActive = false; SysState.dinas.data = null; SysState.dinas.isBarcodeValid = false;
                localStorage.removeItem('cepu_dinas_state');
                renderWorkspace_Dinas(); 
            } else { sysShowToast(res.message, "error"); btn.innerHTML = 'Absen Selesai (Pulang)'; btn.disabled = false; }
        })
        .api_submitPulangDinas(payload, SysState.user);
}

function action_submitDinas_Sales(e) {
    e.preventDefault();
    if (!SysState.dinas.isLocValid || !SysState.dinas.isBarcodeValid) return;
    
    // [UPDATE] Validasi Manual Ekstra untuk VC dan ST
    const statusTerpilih = document.getElementById('sales-sel-status').value;
    let customerValue = "-";
    let lokasiValue = "-";

    if (statusTerpilih === 'VC' || statusTerpilih === 'ST') {
        customerValue = document.getElementById('sales-inp-cust').value.trim();
        lokasiValue = document.getElementById('sales-inp-lokasi').value.trim();
        if (customerValue === "" || lokasiValue === "") {
            sysShowToast("Peringatan: Nama Customer dan Lokasi wajib diisi untuk status VC/ST!", "error");
            return; // Blokir jika kosong
        }
    }

    const btn = document.getElementById('dinas-btn-submit');
    btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Memproses Absensi...'; btn.disabled = true;

    const payload = { 
      noST: "SALES-ABSENSI", 
      customer: customerValue, 
      lokasi: lokasiValue, 
      kordinat: SysState.dinas.kordinat,
      statusAbsensi: statusTerpilih 
    };

    google.script.run
        .withSuccessHandler((res) => {
            if(res.status === "success") { 
                sysShowToast("Absensi Sales Berhasil Tercatat!", "success"); 
                SysState.dinas.isActive = true; 
                SysState.dinas.data = res.data; 
                localStorage.setItem('cepu_dinas_state', JSON.stringify(res.data));
                renderWorkspace_Dinas(); 
            } else { sysShowToast(res.message, "error"); btn.innerHTML = 'Mulai Absensi Sales'; btn.disabled = false; }
        })
        .api_submitPerjalananDinas(payload, SysState.user);
}

function showModal_MasterCRUD(sheetName, headers, rowData, rowIndex, allRows) {
    const isEdit = rowData !== null;
    const safeRowIndex = isEdit ? rowIndex : -1; 

    function getUniqueOptions(colIndex) {
        const options = new Set();
        if (allRows) {
            allRows.forEach(r => {
                let val = r[colIndex];
                if (val !== undefined && val !== null && val.toString().trim() !== "") {
                    options.add(val.toString().trim().toUpperCase());
                }
            });
        }
        return Array.from(options).sort();
    }

    const inputs = headers.map((h, i) => {
        let val = isEdit ? rowData[i] : '';
        let inputEl;
        let dataListEl = null;
        const hUpper = h.toUpperCase();
        
        // [UPDATE MULTI-ROUTING]: Cek apakah ini kolom Dropdown untuk Karyawan atau Latlong
        const isKaryawanDropdown = sheetName === 'Master_Karyawan' && ['JABATAN', 'GOLONGAN', 'STATUS_KARYAWAN', 'DEPARTEMEN', 'LOKASI'].includes(hUpper);
        const isLatlongDropdown = sheetName === 'Master_Latlong' && ['LOKASI', 'STATUS_LATLONG'].includes(hUpper);
        
        if (isKaryawanDropdown || isLatlongDropdown) {
            let uniqueOptions = getUniqueOptions(i);
            
            // [KILLER FEATURE]: Injeksi Opsi Kaku untuk STATUS_LATLONG
            if (hUpper === 'STATUS_LATLONG') {
                uniqueOptions = ['AKTIF', 'NON AKTIF'];
            }

            const listId = `list-${sheetName}-${hUpper}-${i}`; 
            
            const optElements = uniqueOptions.map(opt => DOM_Engine.create('option', '', { value: opt }));
            dataListEl = DOM_Engine.create('datalist', '', { id: listId }, optElements);

            inputEl = DOM_Engine.create('input', 'input-premium w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm text-slate-800 font-bold', { 
                type: 'text', value: val, 'data-crud-field': i, placeholder: `Pilih atau ketik ${h}...`, 
                required: 'true', list: listId, autocomplete: 'off',
                onInput: function() { this.value = this.value.toUpperCase(); } 
            });
        } else {
            // Field lainnya (seperti LAT, LONG, RADIUS MAX) akan menggunakan Text Input biasa
            inputEl = DOM_Engine.create('input', 'input-premium w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm text-slate-800 font-medium', { 
                type: 'text', value: val, 'data-crud-field': i, placeholder: `Isi ${h}...`, required: 'true' 
            });
        }

        const wrapperChildren = [ DOM_Engine.create('label', 'block text-xs font-bold text-slate-600 mb-1.5 uppercase tracking-wide', {}, [h]), inputEl ];
        if (dataListEl) wrapperChildren.push(dataListEl);
        return DOM_Engine.create('div', '', {}, wrapperChildren);
    });

    const formId = 'form-crud-master-data';

    const btnCancel = DOM_Engine.create('button', 'w-full sm:w-auto px-5 py-2.5 text-sm font-bold text-slate-500 hover:bg-slate-100 rounded-xl transition-colors', { type: 'button', onClick: () => document.getElementById('crud-modal').remove() }, ['Batal']);
    
    const btnSave = DOM_Engine.create('button', 'w-full sm:w-auto px-5 py-2.5 text-sm font-bold text-white bg-amber-500 hover:bg-amber-600 rounded-xl shadow-md flex items-center justify-center gap-2 transition-all hover:-translate-y-0.5', { 
        type: 'submit', id: 'btn-crud-save', form: formId 
    }, [DOM_Engine.create('i', 'fa-solid fa-cloud-arrow-up'), isEdit ? 'Simpan Perubahan' : 'Rekam Entitas Baru']);

    const form = DOM_Engine.create('form', 'space-y-4 max-h-[60vh] overflow-y-auto px-6 py-6 hide-scrollbar', { 
        id: formId, 
        onSubmit: (e) => {
            e.preventDefault();
            const payload = [];
            for (let i = 0; i < headers.length; i++) {
                const field = document.querySelector(`[data-crud-field="${i}"]`);
                payload.push(field ? field.value.trim() : "");
            }
            
            if (payload[0] === "") {
                sysShowToast("Gagal: Kolom pertama tidak boleh kosong!", "error");
                return;
            }

            action_saveMasterRow(sheetName, isEdit ? "UPDATE" : "CREATE", payload, safeRowIndex);
        }
    }, [...inputs]);

    const modalContent = DOM_Engine.create('div', 'bg-white rounded-3xl shadow-2xl w-full max-w-lg overflow-hidden border border-slate-100', {}, [
        DOM_Engine.create('div', 'p-5 border-b border-slate-100 flex justify-between bg-slate-50/50', {}, [
            DOM_Engine.create('h3', 'font-extrabold text-slate-800 text-lg', {}, [isEdit ? 'Ubah Data' : 'Tambah Entitas Baru']),
            DOM_Engine.create('button', 'text-slate-400 hover:text-red-500', { type: 'button', onClick: () => document.getElementById('crud-modal').remove() }, [DOM_Engine.create('i', 'fa-solid fa-times text-lg')])
        ]),
        form, 
        DOM_Engine.create('div', 'p-5 border-t bg-slate-50 flex flex-col sm:flex-row justify-end gap-3', {}, [btnCancel, btnSave]) 
    ]);

    document.body.appendChild(DOM_Engine.create('div', 'fixed inset-0 bg-slate-900/60 backdrop-blur-sm z-[110] flex items-center justify-center p-4', { id: 'crud-modal' }, [modalContent]));
}

function action_saveMasterRow(sheetName, actionStr, payload, rowIndex) {
    const btn = document.getElementById('btn-crud-save');
    btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Menyinkronisasi...';
    btn.disabled = true;

    console.log(`[DEBUG FRONTEND] 4. Menghubungi Server API... Action: ${actionStr}`);

    google.script.run
        .withSuccessHandler((res) => {
            console.log("[DEBUG FRONTEND] 5. Respon Sukses dari Server:", res);
            if (res.status === 'success') {
                sysShowToast(res.message, 'success');
                document.getElementById('crud-modal').remove();
                action_loadMasterTable(sheetName); 
            } else {
                sysShowToast("Error Server: " + res.message, 'error');
                btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> Coba Lagi';
                btn.disabled = false;
            }
        })
        // [UPDATE DEBUG FIX]: Menangkap jika Backend Crash Total!
        .withFailureHandler((err) => {
            console.error("[DEBUG FRONTEND] 💥 SERVER CRASH:", err);
            sysShowToast("CRITICAL ERROR: Cek Console Browser (F12)!", 'error');
            btn.innerHTML = '<i class="fa-solid fa-triangle-exclamation"></i> Gagal Sistem';
            btn.disabled = false;
        })
        .api_adminMutateMaster(actionStr, sheetName, payload, rowIndex);
}

            document.getElementById(modalId).remove();

function execute_resetDevice(nrpp) {
    const btn = document.getElementById(`btn-reset-${nrpp}`);
    if(btn) { btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Mereset...'; btn.disabled = true; }

    google.script.run.withSuccessHandler((res) => {
        if(res.status === 'success') {
            sysShowToast(res.message, 'success');
            action_openSubMenu_UnlockDevice(); // Refresh Data UI
        } else { 
            sysShowToast(res.message, 'error'); 
            if(btn) { btn.innerHTML = '<i class="fa-solid fa-mobile-screen-button"></i> Reset Device (Unlock)'; btn.disabled = false; }
        }
    }).api_adminResetDevice(nrpp);
}

// Fungsi Eksekutor (Dipisahkan agar logika bersih)
function execute_resetDevice(nrpp) {
    const btn = document.getElementById(`btn-reset-${nrpp}`);
    if(btn) {
        btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Mereset...'; 
        btn.disabled = true;
    }

    google.script.run.withSuccessHandler((res) => {
        if(res.status === 'success') {
            sysShowToast(res.message, 'success');
            renderWorkspace_KelolaKaryawan(); // Auto-refresh UI Kartu
        } else { 
            sysShowToast(res.message, 'error'); 
            if(btn) {
                btn.innerHTML = '<i class="fa-solid fa-mobile-screen-button"></i> Reset Device (Unlock)'; 
                btn.disabled = false; 
            }
        }
    }).api_adminResetDevice(nrpp);
}

        ]),
        DOM_Engine.create('button', 'bg-white hover:bg-slate-50 text-slate-600 border border-slate-200 px-4 py-2 rounded-xl font-bold text-sm shadow-sm flex items-center gap-2 transition-all', { onClick: renderWorkspace_Approval }, [DOM_Engine.create('i', 'fa-solid fa-rotate-right'), 'Refresh Data'])

            DOM_Engine.create('h3', 'text-lg font-bold text-slate-500', {}, ['Semua bersih! Tidak ada antrean Approval.'])
        ])]));
        return;
    }

    // --- NEW BULK ACTION BAR (WITH UNLOCK FEATURE) ---
    const bulkActionBar = DOM_Engine.create('div', 'bg-white border border-indigo-100 p-4 rounded-2xl mb-6 flex flex-col md:flex-row justify-between items-center gap-4 shadow-sm fade-in-up', {}, [
        DOM_Engine.create('div', 'flex items-center gap-3', {}, [
            DOM_Engine.create('div', 'w-10 h-10 bg-indigo-50 text-indigo-500 rounded-lg flex items-center justify-center text-lg', {}, [DOM_Engine.create('i', 'fa-solid fa-layer-group')]),
            DOM_Engine.create('span', 'font-bold text-indigo-600', {id: 'txt-selected-count'}, ['0 Dokumen Terpilih'])
        ]),
        DOM_Engine.create('div', 'flex gap-3 w-full md:w-auto', {}, [
            // Tombol Bulk Unlock (Gembok)
            DOM_Engine.create('button', 'flex-1 md:flex-none px-5 py-2.5 bg-white border border-indigo-200 text-indigo-600 text-sm font-bold rounded-xl shadow-sm hover:bg-indigo-50 transition-colors flex items-center justify-center gap-2 opacity-50 cursor-not-allowed', { 
                id: 'btn-bulk-unlock', disabled: true, onClick: action_executeBulkUnlockPrint 
            }, [DOM_Engine.create('i', 'fa-solid fa-lock-open'), 'Buka Gembok Terpilih']),
            
            // Tombol Bulk Approve
            DOM_Engine.create('button', 'flex-1 md:flex-none px-5 py-2.5 bg-indigo-600 hover:bg-indigo-700 text-white text-sm font-bold rounded-xl shadow-md transition-colors flex items-center justify-center gap-2 opacity-50 cursor-not-allowed', { 
                id: 'btn-bulk-approve', disabled: true, onClick: action_executeBulkApprove 
            }, [DOM_Engine.create('i', 'fa-solid fa-check-double'), 'Approve Terpilih'])
        ])
    ]);

    const toggleCheckbox = (idTransaksi, checked) => {
        if (checked) State_BulkApproval.push(idTransaksi);
        else State_BulkApproval = State_BulkApproval.filter(id => id !== idTransaksi);
        const count = State_BulkApproval.length;
        document.getElementById('txt-selected-count').innerText = `${count} Dokumen Terpilih`;
        
        const btnApp = document.getElementById('btn-bulk-approve');
        const btnUnl = document.getElementById('btn-bulk-unlock');
        
        if (count > 0) { 
            [btnApp, btnUnl].forEach(b => {
                b.disabled = false; b.classList.remove('opacity-50', 'cursor-not-allowed');
            });
        } else {
            [btnApp, btnUnl].forEach(b => {
                b.disabled = true; b.classList.add('opacity-50', 'cursor-not-allowed');
            });
        }
    };

    const toggleCheckAll = (checked) => {
        State_BulkApproval = [];
        document.querySelectorAll('.chk-approve-item').forEach(chk => {
            chk.checked = checked;
            if (checked) State_BulkApproval.push(chk.value);
        });
        toggleCheckbox(null, false);
    };

    const trs = logs.map(log => {
        let jamMasukUI, statusUI, rowBg = 'hover:bg-slate-50/50';
        if (log.isAnomali) {
            rowBg = 'bg-rose-50/30 hover:bg-rose-50';
            jamMasukUI = DOM_Engine.create('div', 'flex items-center gap-2 text-rose-500', {}, [DOM_Engine.create('i', 'fa-solid fa-triangle-exclamation animate-pulse'), DOM_Engine.create('span', 'text-sm font-extrabold', {}, ['AUTO-CHECKOUT (23:59)'])]);
            statusUI = DOM_Engine.create('span', 'text-[10px] font-bold px-3 py-1.5 rounded-full bg-rose-100 text-rose-600 shadow-sm', {}, ['ANOMALI / SIDANG']);
        } else {
            jamMasukUI = DOM_Engine.create('span', 'text-sm font-bold text-slate-700', {}, [log.waktuMasuk, ' WIB']);
            statusUI = DOM_Engine.create('span', 'text-[10px] font-bold px-3 py-1.5 rounded-full bg-slate-100 text-slate-600 shadow-sm', {}, [log.persetujuan]);
        }

        const btnEdit = DOM_Engine.create('button', 'w-9 h-9 bg-amber-100 text-amber-600 hover:bg-amber-500 hover:text-white rounded-xl flex items-center justify-center transition-all shadow-sm border border-amber-200 hover:border-amber-500', {
            title: 'Koreksi Data (Sidang HRD)',
            onClick: () => action_openEditSidang(log)
        }, [DOM_Engine.create('i', 'fa-solid fa-pen-to-square')]);

        const aksiButtons = [btnEdit];
        if (log.statusKlaim && log.statusKlaim.toUpperCase().includes("SUDAH")) {
            const btnUnlock = DOM_Engine.create('button', 'w-9 h-9 bg-indigo-100 text-indigo-600 hover:bg-indigo-600 hover:text-white rounded-xl flex items-center justify-center transition-all shadow-sm border border-indigo-200 ml-2', {
                title: 'Buka Gembok Cetak (Mekanik bisa print ulang)',
                onClick: () => action_openUnlockModal(log.customer, log.idTransaksi, log.nrpp) 
            }, [DOM_Engine.create('i', 'fa-solid fa-lock-open')]);
            aksiButtons.push(btnUnlock);
        }

        return DOM_Engine.create('tr', `${rowBg} transition-colors border-b border-slate-100`, {}, [
            DOM_Engine.create('td', 'px-5 py-4 text-center', {}, [DOM_Engine.create('input', 'chk-approve-item w-5 h-5 text-indigo-600 rounded border-slate-300 cursor-pointer', { type: 'checkbox', value: log.idTransaksi, onChange: (e) => toggleCheckbox(e.target.value, e.target.checked) })]),
            DOM_Engine.create('td', 'px-5 py-4 whitespace-nowrap', {}, [DOM_Engine.create('p', 'text-sm font-extrabold text-slate-800', {}, [log.nama]), DOM_Engine.create('p', 'text-[10px] font-bold text-slate-400 uppercase tracking-wider', {}, [log.nrpp])]),
            DOM_Engine.create('td', 'px-5 py-4 whitespace-nowrap text-sm font-bold text-slate-700', {}, [log.customer]),
            DOM_Engine.create('td', 'px-5 py-4 whitespace-nowrap text-sm text-slate-500 font-medium', {}, [log.waktuKeluar]),
            DOM_Engine.create('td', 'px-5 py-4 whitespace-nowrap', {}, [jamMasukUI]),
            DOM_Engine.create('td', 'px-5 py-4 whitespace-nowrap text-center', {}, [statusUI]),
            DOM_Engine.create('td', 'px-5 py-4 whitespace-nowrap text-center', {}, [DOM_Engine.create('div', 'flex items-center justify-center', {}, aksiButtons)]) 
        ]);
    });

    const thead = DOM_Engine.create('thead', 'bg-slate-50/80 border-b border-slate-200', {}, [
        DOM_Engine.create('tr', '', {}, [
            DOM_Engine.create('th', 'px-5 py-4 text-center', {}, [DOM_Engine.create('input', 'w-5 h-5 cursor-pointer', { type: 'checkbox', onChange: (e) => toggleCheckAll(e.target.checked) })]), 
            ...['Personel', 'Customer', 'Jam Keluar', 'Jam Masuk', 'Status', 'Aksi'].map(h => DOM_Engine.create('th', 'px-5 py-4 text-left text-xs font-extrabold text-slate-500 uppercase tracking-widest', {}, [h]))
        ])
    ]);

    container.appendChild(DOM_Engine.create('div', 'bg-aurora min-h-screen p-2', {}, [
        headerSec, bulkActionBar, 
        DOM_Engine.create('div', 'glass overflow-x-auto rounded-[2rem] shadow-premium border border-white fade-in-up', {}, [
            DOM_Engine.create('table', 'min-w-full', {}, [thead, DOM_Engine.create('tbody', 'bg-white/40', {}, trs)])
        ])
    ]));
}

function action_openUnlockModal(custName, idTrx, nrpp) {

        onClick: () => document.getElementById(modalId).remove()

function action_executeBulkUnlockPrint() {
    if (State_BulkApproval.length === 0) return;
    
    const modalId = 'modal-bulk-unlock';

    const btnCancel = DOM_Engine.create('button', 'w-full sm:w-auto px-5 py-2.5 text-sm font-bold text-slate-500 hover:bg-slate-100 rounded-xl transition-colors', { 
        onClick: () => document.getElementById(modalId).remove() 
    }, ['Batal']);

    const btnConfirm = DOM_Engine.create('button', 'w-full sm:w-auto px-5 py-2.5 text-sm font-bold text-white bg-indigo-600 hover:bg-indigo-700 rounded-xl shadow-md flex items-center justify-center gap-2 transition-all hover:-translate-y-0.5', {
        id: 'btn-exec-bulk-unlock',
        onClick: () => {
            // Animasi Loading di Modal
            const btn = document.getElementById('btn-exec-bulk-unlock');
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Memproses...'; 
            btn.disabled = true;

            // Animasi Loading di Tombol Utama (Belakang Layar)
            const mainBtn = document.getElementById('btn-bulk-unlock');
            const originalHtml = mainBtn.innerHTML;
            mainBtn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i>...'; 
            mainBtn.disabled = true;

            google.script.run.withSuccessHandler((res) => {
                document.getElementById(modalId).remove();
                mainBtn.innerHTML = originalHtml; 
                mainBtn.disabled = false;
                
                if (res.status === 'success') {
                    sysShowToast(res.message, 'success');
                    renderWorkspace_Approval(); 
                } else sysShowToast(res.message, 'error');
            }).api_adminBulkUnlockPrint(State_BulkApproval);
        }
    }, [DOM_Engine.create('i', 'fa-solid fa-unlock-keyhole'), 'Ya, Eksekusi Masal']);

    const modalContent = DOM_Engine.create('div', 'bg-white rounded-[2rem] shadow-2xl w-full max-w-sm overflow-hidden transform transition-transform scale-100 fade-in-up border border-slate-100 p-8 text-center relative', {}, [
        // Aura Latar Indigo
        DOM_Engine.create('div', 'absolute -top-10 -left-10 w-32 h-32 bg-indigo-50 rounded-full blur-2xl opacity-80 pointer-events-none'),
        
        DOM_Engine.create('div', 'w-20 h-20 bg-indigo-50 border border-indigo-100 rounded-full flex items-center justify-center mx-auto mb-5 shadow-inner relative z-10', {}, [
            DOM_Engine.create('i', 'fa-solid fa-layer-group text-4xl text-indigo-500 animate-bounce') // Ikon Multiple/Masal

function action_exportExcel(sheetName, dataMatrix, btnElement, originalHtml) {
    if (typeof XLSX === "undefined") {
        const script = document.createElement("script");
        script.src = "https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js";
        script.onload = () => executeExcelExport(sheetName, dataMatrix, btnElement, originalHtml);
        document.head.appendChild(script);
    } else { 
        executeExcelExport(sheetName, dataMatrix, btnElement, originalHtml); 
    }
}

function executeExcelExport(sheetName, dataMatrix, btnElement, originalHtml) {
    try {
        // 1. Membuat Workbook dan Worksheet virtual dari Data Matriks Backend
        const wb = XLSX.utils.book_new();
        const ws = XLSX.utils.aoa_to_sheet(dataMatrix);
        XLSX.utils.book_append_sheet(wb, ws, "Rekap_Payroll");
        
        // 2. Format penamaan file otomatis dengan Timestamp
        const timeStamp = new Date().toISOString().slice(0,10).replace(/-/g,"");
        const fileName = `C_E_P_U_${sheetName}_${timeStamp}.xlsx`;
        
        // 3. Mengunduh file .xlsx
        XLSX.writeFile(wb, fileName);
        sysShowToast(`File Excel ${sheetName} berhasil diunduh!`, "success");
    } catch(e) {
        console.error("Export Error:", e);
        sysShowToast("Gagal melakukan kompilasi Excel.", "error");
    } finally {
        // 4. Mengembalikan status tombol seperti semula
        btnElement.innerHTML = originalHtml;
        btnElement.disabled = false;
    }
}

function action_lockPrintStatus(stNumber) {
    google.script.run.withSuccessHandler((res) => {
        if (res.status === 'success') {
            // Refresh tabel 3 detik setelah cetak agar tombol langsung tergembok di UI
            setTimeout(() => renderWorkspace_LogPribadi(), 3000); 
        }
    }).api_updatePrintStatus(stNumber, SysState.user);
}

// --- WORKSPACE CETAK DEKLARASI ---
function renderWorkspace_CetakDeklarasi() {
    DOM_Engine.clear('nav-workspace');
    const container = document.getElementById('nav-workspace');
    
    container.appendChild(DOM_Engine.create('div', 'flex flex-col items-center justify-center py-20 fade-in', {}, [

                DOM_Engine.create('div', 'p-2 bg-purple-100 rounded-xl', {}, [DOM_Engine.create('i', 'fa-solid fa-print text-purple-600')]),

            ]),
            DOM_Engine.create('p', 'text-slate-500 text-sm mt-2 ml-14', {}, ['Ekspor form deklarasi resmi untuk klaim perjalanan per Nomor Surat Tugas.'])
        ]),

    }

        const logs = groupedData[st];
        let isComplete = logs.every(l => l.status.toUpperCase() === "SELESAI");

    const grid = DOM_Engine.create('div', 'grid grid-cols-1 lg:grid-cols-2 gap-5', {}, cards);
    container.appendChild(DOM_Engine.create('div', 'bg-slate-50 min-h-screen p-2', {}, [headerSec, grid]));

function execute_downloadDeklarasiPDF(stNumber, logs) {

    const verificationUrl = webAppUrl + "?verify_st=" + stNumber + "&nrpp=" + SysState.user.nrpp;
    const qrCodeImage = "https://quickchart.io/qr?text=" + encodeURIComponent(verificationUrl) + "&size=80&margin=0";

    let berangkat = logs.length > 0 ? logs[0].waktuKeluar : '-';
    let kembali = logs.length > 0 ? logs[logs.length-1].waktuMasuk : '-';
    let customer = logs.length > 0 ? logs[0].customer : '-';
    let lokasiDestinasi = logs.length > 0 ? logs[0].lokasi : '-';

    let minTglKeluar = null;
    if (berangkat !== '-') {
        let datePart = berangkat.split(' ')[0].split('/');

    const bulanRomawi = ["I", "II", "III", "IV", "V", "VI", "VII", "VIII", "IX", "X", "XI", "XII"];

    html2pdf().set(opt).from(pdfContainer).save().then(() => {

    DOM_Engine.clear('nav-workspace');

    container.appendChild(DOM_Engine.create('div', 'flex flex-col items-center justify-center py-20 fade-in', {}, [

function buildUI_AuditLogSelection(dataKaryawan) {
    DOM_Engine.clear('nav-workspace');
    const container = document.getElementById('nav-workspace');

    const btnBack = DOM_Engine.create('button', 'text-slate-500 hover:text-indigo-600 font-medium flex items-center gap-2 mb-6 transition-colors', { onClick: renderWorkspace_KelolaKaryawan }, [DOM_Engine.create('i', 'fa-solid fa-arrow-left'), ' Kembali ke HRIS Center']);

    // [UPDATE KILLER UI]: Header section dengan Search Bar di sebelah kanan
    const headerSec = DOM_Engine.create('div', 'mb-8 fade-in flex flex-col md:flex-row md:items-end justify-between gap-4', {}, [
        DOM_Engine.create('div', '', {}, [
            btnBack,
            DOM_Engine.create('h2', 'text-3xl font-extrabold text-slate-900 tracking-tight flex items-center gap-3', {}, [DOM_Engine.create('i', 'fa-solid fa-user-clock text-blue-500'), 'Audit Perjalanan 30 Hari']),
            DOM_Engine.create('p', 'text-slate-500 text-sm mt-1', {}, ['Pilih karyawan untuk mengunduh laporan aktivitas bulanan.'])
        ]),
        // --- SEARCH ENGINE BAR ---
        DOM_Engine.create('div', 'bg-white border border-slate-200 rounded-xl px-4 py-3 flex items-center gap-3 shadow-sm flex-shrink-0', {}, [
            DOM_Engine.create('i', 'fa-solid fa-magnifying-glass text-slate-400'),
            DOM_Engine.create('input', 'bg-transparent border-none outline-none text-sm font-semibold text-slate-700 w-full md:w-64 placeholder-slate-400', { 
                type: 'text', placeholder: 'Cari Nama / NRPP / Jabatan...',
                onInput: (e) => {
                    const term = e.target.value.toLowerCase();
                    document.querySelectorAll('.audit-card').forEach(card => {
                        const dataText = card.getAttribute('data-search'); // Pindai dari atribut tersembunyi
                        card.style.display = dataText.includes(term) ? 'flex' : 'none';
                    });
                }
            })
        ])
    ]);

    const cards = dataKaryawan.map(k => {
        return DOM_Engine.create('div', 'audit-card glass p-6 rounded-[1.5rem] shadow-premium hover:shadow-2xl transition-all border border-white flex flex-col justify-between group', {
            // Injeksi Search Parameter
            'data-search': `${k.nama} ${k.nrpp} ${k.jabatan}`.toLowerCase()
        }, [
            DOM_Engine.create('div', 'flex items-center gap-4 mb-5', {}, [
                DOM_Engine.create('div', 'w-14 h-14 bg-blue-50 text-blue-500 rounded-full flex items-center justify-center text-xl font-black shadow-inner flex-shrink-0', {}, [k.nama.charAt(0).toUpperCase()]),
                DOM_Engine.create('div', 'overflow-hidden', {}, [
                    DOM_Engine.create('h3', 'text-lg font-bold text-slate-800 tracking-tight truncate', {}, [k.nama]),
                    DOM_Engine.create('p', 'text-[10px] font-bold text-slate-400 uppercase tracking-wider', {}, [k.nrpp + ' • ' + k.jabatan]) // Menambahkan Info Jabatan
                ])
            ]),
            DOM_Engine.create('button', 'w-full py-3 bg-slate-900 hover:bg-blue-600 text-white rounded-xl text-xs font-bold transition-all shadow-md flex justify-center items-center gap-2', { 
                onClick: () => execute_generateIndividualAuditPDF(k)
            }, [DOM_Engine.create('i', 'fa-solid fa-file-pdf'), 'Generate Audit Log'])
        ]);
    });

    const grid = DOM_Engine.create('div', 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6', {}, cards);
    container.appendChild(DOM_Engine.create('div', 'bg-aurora min-h-screen p-2', {}, [headerSec, grid]));
}

// ==========================================================
// MODAL PEMILIH BULAN & TAHUN (MEWAH)
// ==========================================================
function execute_generateIndividualAuditPDF(user) {
    const modalId = 'modal-audit-picker';
    const months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
    const currentYear = new Date().getFullYear();

    const btnCancel = DOM_Engine.create('button', 'w-full sm:w-auto px-5 py-2.5 text-sm font-bold text-slate-500 hover:bg-slate-100 rounded-xl transition-colors', { 
        onClick: () => document.getElementById(modalId).remove() 
    }, ['Batal']);

    const btnConfirm = DOM_Engine.create('button', 'w-full sm:w-auto px-5 py-2.5 text-sm font-bold text-white bg-blue-600 hover:bg-blue-700 rounded-xl shadow-md flex items-center justify-center gap-2 transition-all hover:-translate-y-0.5', {
        id: 'btn-exec-generate-pdf',
        onClick: () => {
            const m = document.getElementById('sel-audit-month').value;
            const y = document.getElementById('sel-audit-year').value;
            const btn = document.getElementById('btn-exec-generate-pdf');
            
            btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Menarik Data...';
            btn.disabled = true;

            google.script.run.withSuccessHandler((res) => {
                document.getElementById(modalId).remove();
                if (res.status === 'success') {
                    if (res.data.length === 0) {
                        sysShowToast("Tidak ada data perjalanan di periode tersebut.", "info");
                    } else {
                        // Pastikan html2pdf terload sebelum eksekusi
                        if (typeof html2pdf === "undefined") {
                            const script = document.createElement("script");
                            script.src = "https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js";
                            script.onload = () => renderPDF_IndividualAudit(user, res.data, res.filter);
                            document.head.appendChild(script);
                        } else {
                            renderPDF_IndividualAudit(user, res.data, res.filter);
                        }
                    }
                } else sysShowToast(res.message, "error");
            }).api_adminGetIndividualLogs(user.nrpp, m, y);
        }
    }, [DOM_Engine.create('i', 'fa-solid fa-file-pdf'), 'Cetak Audit Log']);

    const modalContent = DOM_Engine.create('div', 'bg-white rounded-[2rem] shadow-2xl w-full max-w-sm overflow-hidden border border-slate-100 p-8 text-center relative fade-in-up', {}, [
        DOM_Engine.create('div', 'w-16 h-16 bg-blue-50 text-blue-500 rounded-2xl flex items-center justify-center mx-auto mb-5 shadow-inner', {}, [
            DOM_Engine.create('i', 'fa-solid fa-calendar-check text-3xl')
        ]),
        DOM_Engine.create('h3', 'font-extrabold text-slate-800 text-2xl mb-1 tracking-tight', {}, ['Pilih Periode Audit']),
        DOM_Engine.create('p', 'text-xs text-slate-500 mb-6', {}, [`Tentukan bulan laporan untuk ${user.nama}`]),
        
        DOM_Engine.create('div', 'space-y-4 mb-8 text-left', {}, [
            DOM_Engine.create('div', '', {}, [
                DOM_Engine.create('label', 'text-[10px] font-bold text-slate-400 uppercase ml-1', {}, ['Pilih Bulan']),
                DOM_Engine.create('select', 'input-premium w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-bold mt-1', { id: 'sel-audit-month' }, 
                    months.map((m, i) => DOM_Engine.create('option', '', { value: i, selected: i === new Date().getMonth() }, [m]))
                )
            ]),
            DOM_Engine.create('div', '', {}, [
                DOM_Engine.create('label', 'text-[10px] font-bold text-slate-400 uppercase ml-1', {}, ['Pilih Tahun']),
                DOM_Engine.create('select', 'input-premium w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 text-sm font-bold mt-1', { id: 'sel-audit-year' }, 
                    [currentYear, currentYear-1].map(y => DOM_Engine.create('option', '', { value: y }, [y.toString()]))
                )
            ])
        ]),
        
        DOM_Engine.create('div', 'flex flex-col sm:flex-row justify-center gap-3', {}, [btnCancel, btnConfirm])
    ]);

    document.body.appendChild(DOM_Engine.create('div', 'fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[150] flex items-center justify-center p-4 fade-in', { id: modalId }, [modalContent]));
}

// ==========================================================
// RENDER PDF INDIVIDU (PIXEL-PERFECT ENTERPRISE TEMPLATE)
// ==========================================================
function renderPDF_IndividualAudit(user, logs, filter) {
    sysShowToast("Membangun dokumen PDF premium...", "info");
    const months = ["Januari", "Februari", "Maret", "April", "Mei", "Juni", "Juli", "Agustus", "September", "Oktober", "November", "Desember"];
    const periodeStr = `${months[filter.month]} ${filter.year}`;
    const now = new Date();
    const tglCetak = now.toLocaleDateString('id-ID', { day: '2-digit', month: 'long', year: 'numeric' }) + ' ' + 
                     now.toLocaleTimeString('id-ID', { hour: '2-digit', minute: '2-digit' }) + ' WIB';

    let totalDurasi = 0, totalNominal = 0;
    
    // Looping Data Tabel dengan Desain Striped (Belang-belang) & Badge Status
    let rowsHtml = logs.map((l, i) => {
        totalDurasi += l.durasi; totalNominal += l.nominal;
        
        const bgRow = i % 2 === 0 ? '#ffffff' : '#f8fafc'; // Efek Zebra Cross untuk tabel
        let badgeColor = l.persetujuan.toUpperCase() === 'APPROVED' ? '#059669' : (l.persetujuan.toUpperCase().includes('PENDING') ? '#d97706' : '#e11d48');
        let badgeBg = l.persetujuan.toUpperCase() === 'APPROVED' ? '#ecfdf5' : (l.persetujuan.toUpperCase().includes('PENDING') ? '#fffbeb' : '#ffe4e6');

        return `
            <tr style="background-color: ${bgRow};">
                <td style="text-align:center; border-bottom: 1px solid #e2e8f0; padding: 12px 8px; color:#475569;">${i+1}</td>
                <td style="border-bottom: 1px solid #e2e8f0; padding: 12px 8px; color:#334155; font-weight: 500;">${l.tanggal}</td>
                <td style="border-bottom: 1px solid #e2e8f0; padding: 12px 8px;">
                    <strong style="color:#0f172a; display:block; margin-bottom:2px;">${l.customer}</strong>
                    <span style="color:#64748b; font-size:7.5pt;">${l.lokasi}</span>
                </td>
                <td style="text-align:center; border-bottom: 1px solid #e2e8f0; padding: 12px 8px; font-weight:bold; color:#334155;">${l.durasi.toFixed(2)} <span style="font-size: 7pt; color: #94a3b8; font-weight: normal;">Jam</span></td>
                <td style="text-align:right; border-bottom: 1px solid #e2e8f0; padding: 12px 8px; font-weight:bold; color:#0f172a;">Rp ${l.nominal.toLocaleString('id-ID')}</td>
                <td style="text-align:center; border-bottom: 1px solid #e2e8f0; padding: 12px 8px;">
                    <span style="background-color: ${badgeBg}; color: ${badgeColor}; padding: 5px 10px; border-radius: 6px; font-size: 7pt; font-weight: bold; letter-spacing: 0.5px;">${l.persetujuan}</span>
                </td>
            </tr>`;
    }).join('');

    const pdfContent = document.createElement('div');
    // Lebar absolut untuk mencegah tabel hancur/berantakan
    pdfContent.style.width = "800px"; 
    pdfContent.style.padding = "40px";
    pdfContent.style.backgroundColor = "#ffffff";
    pdfContent.style.fontFamily = "Helvetica, Arial, sans-serif";

    pdfContent.innerHTML = `
        <table style="width: 100%; border-bottom: 3px solid #1e3a8a; padding-bottom: 10px; margin-bottom: 25px;">
            <tr>
                <td style="vertical-align: bottom;">
                    <h1 style="margin: 0; color: #1e3a8a; font-size: 26pt; font-weight: 900; letter-spacing: -0.5px;">C.E.P.U</h1>
                    <p style="margin: 4px 0 0 0; font-size: 9pt; font-weight: bold; color: #64748b; letter-spacing: 1.5px;">AUDIT LOG PERJALANAN DINAS</p>
                </td>
                <td style="text-align: right; vertical-align: bottom;">
                    <p style="margin: 0; font-size: 8pt; color: #94a3b8; text-transform: uppercase; font-weight: bold;">Periode Laporan</p>
                    <p style="margin: 2px 0 0 0; font-size: 12pt; font-weight: 900; color: #2563eb; text-transform: uppercase; letter-spacing: 0.5px;">${periodeStr}</p>
                </td>
            </tr>
        </table>

        <table style="width: 100%; background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 12px; padding: 15px; margin-bottom: 25px; font-size: 9pt;">

                <td style="width: 15%; color: #64748b; padding: 6px 8px;">NRPP / Jabatan</td>
                <td style="width: 35%; padding: 6px 8px; color: #334155; font-weight: bold;">: ${user.nrpp} / ${user.jabatan}</td>
            </tr>
            <tr>
                <td style="color: #64748b; padding: 6px 8px;">Unit Kerja</td>
                <td style="padding: 6px 8px; color: #334155;">: ${user.departemen} - ${user.lokasi}</td>
                <td style="color: #64748b; padding: 6px 8px;">Waktu Cetak</td>
                <td style="padding: 6px 8px; color: #334155;">: ${tglCetak}</td>
            </tr>

                    <th style="background: #f1f5f9; color: #475569; padding: 14px 8px; border-bottom: 2px solid #cbd5e1; text-align: right; width: 17%; font-weight: bold; letter-spacing: 0.5px;">NOMINAL</th>
                    <th style="background: #f1f5f9; color: #475569; padding: 14px 8px; border-bottom: 2px solid #cbd5e1; text-align: center; width: 16%; font-weight: bold; letter-spacing: 0.5px;">APPROVAL</th>
                </tr>
            </thead>
            <tbody>
                ${rowsHtml}
            </tbody>
        </table>

        <div style="margin-top: 50px; text-align: right; page-break-inside: avoid;">
            <div style="display: inline-block; text-align: center; width: 250px;">
                <p style="margin: 0 0 60px 0; color: #64748b; font-size: 9pt;">Dicetak Oleh Sistem,</p>
                <p style="margin: 0; font-weight: 900; color: #0f172a; font-size: 10pt; text-decoration: underline;">HRD COMMAND CENTER</p>
                <p style="margin: 4px 0 0 0; font-size: 7.5pt; color: #94a3b8; font-weight: bold; text-transform: uppercase; letter-spacing: 1px;">Security Verified Log</p>
            </div>
        </div>
    `;

    const opt = {
        margin:       [0.4, 0.4, 0.4, 0.4],
        filename:     `Audit_Log_${user.nrpp}_${periodeStr.replace(' ', '_')}.pdf`,
        image:        { type: 'jpeg', quality: 1 },
        html2canvas:  { scale: 2, useCORS: true, letterRendering: true },
        jsPDF:        { unit: 'in', format: 'a4', orientation: 'portrait' }
    };

    html2pdf().set(opt).from(pdfContent).save().then(() => {
        sysShowToast("Audit Log Premium berhasil diunduh!", "success");
    }).catch(err => {
        console.error(err);
        sysShowToast("Gagal mengunduh PDF.", "error");
    });
}

function action_openInputSTModal(stName, logs) {
    const modalId = 'modal-update-st-epicor';

    const btnCancel = DOM_Engine.create('button', 'w-full sm:w-auto px-5 py-2.5 text-sm font-bold text-slate-500 hover:bg-slate-100 rounded-xl transition-colors', { 
        type: 'button', onClick: () => document.getElementById(modalId).remove() 
    }, ['Batal']);

    const btnSave = DOM_Engine.create('button', 'w-full sm:w-auto px-5 py-2.5 text-sm font-bold text-white bg-indigo-600 hover:bg-indigo-700 rounded-xl shadow-md flex items-center justify-center gap-2 transition-all', { 
        type: 'button', id: 'btn-save-new-st',
        onClick: () => {
            const newST = document.getElementById('inp-new-epicor-st').value.trim();
            if(!newST) return sysShowToast("Nomor ST Epicor wajib diisi!", "error");
            
            const checkedBoxes = document.querySelectorAll('.chk-update-st:checked');
            if(checkedBoxes.length === 0) return sysShowToast("Pilih minimal 1 kunjungan yang ingin dimasukkan ke ST ini!", "error");
            
            const trxIds = Array.from(checkedBoxes).map(cb => cb.value);
            execute_updateSTEpicor(trxIds, newST, modalId);
        }
    }, [DOM_Engine.create('i', 'fa-solid fa-cloud-arrow-up'), 'Simpan & Update ST']);

    // List Checkbox Perjalanan
    const logElements = logs.map(l => {
        return DOM_Engine.create('label', 'flex items-center gap-3 p-3 bg-white border border-slate-200 rounded-xl cursor-pointer hover:border-indigo-300 transition-colors shadow-sm mb-2 group', {}, [
            DOM_Engine.create('input', 'chk-update-st w-5 h-5 text-indigo-600 rounded cursor-pointer border-slate-300', { type: 'checkbox', value: l.idTransaksi }),
            DOM_Engine.create('div', 'flex-1', {}, [
                DOM_Engine.create('p', 'text-sm font-bold text-slate-800 leading-tight group-hover:text-indigo-600', {}, [l.customer]),
                DOM_Engine.create('p', 'text-[10px] text-slate-500', {}, [`Berangkat: ${l.waktuKeluar} | Durasi: ${l.durasi} Jam`])
            ])
        ]);
    });

    const formEdit = DOM_Engine.create('div', 'px-6 py-4 text-left max-h-[60vh] overflow-y-auto bg-slate-50', {}, [
        DOM_Engine.create('div', 'mb-5', {}, [
            DOM_Engine.create('label', 'block text-xs font-bold text-slate-600 mb-1 uppercase tracking-wider', {}, ['Nomor ST Resmi (Epicor)']),
            DOM_Engine.create('input', 'input-premium w-full bg-white border-indigo-200 px-4 py-3 text-sm font-black uppercase text-indigo-700 shadow-inner', { 
                type: 'text', id: 'inp-new-epicor-st', placeholder: 'Ketik Nomor ST Baru...',
                onInput: function() { this.value = this.value.toUpperCase(); }
            })
        ]),
        DOM_Engine.create('label', 'block text-xs font-bold text-slate-600 mb-2 uppercase tracking-wider', {}, ['Pilih Kunjungan (Centang yang sesuai):']),
        DOM_Engine.create('div', '', {}, logElements)
    ]);

    const modalContent = DOM_Engine.create('div', 'bg-white rounded-3xl shadow-2xl w-full max-w-md overflow-hidden border border-slate-100 text-center relative fade-in-up', {}, [
        DOM_Engine.create('div', 'p-5 border-b border-slate-100 flex justify-between items-center', {}, [
            DOM_Engine.create('h3', 'font-extrabold text-slate-800 text-lg flex items-center gap-2', {}, [DOM_Engine.create('i', 'fa-solid fa-file-pen text-indigo-600'), 'Input No ST Epicor']),
            DOM_Engine.create('button', 'text-slate-400 hover:text-red-500', { type: 'button', onClick: () => document.getElementById(modalId).remove() }, [DOM_Engine.create('i', 'fa-solid fa-times')])
        ]),
        formEdit,
        DOM_Engine.create('div', 'p-5 border-t border-slate-100 bg-white flex flex-col sm:flex-row justify-end gap-3', {}, [btnCancel, btnSave]) 
    ]);

    document.body.appendChild(DOM_Engine.create('div', 'fixed inset-0 bg-slate-900/60 backdrop-blur-md z-[110] flex items-center justify-center p-4 fade-in', { id: modalId }, [modalContent]));
}

function execute_updateSTEpicor(trxIds, newST, modalId) {
    const btn = document.getElementById('btn-save-new-st');
    if(!btn) return;
    
    btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Menyinkronkan...'; 
    btn.disabled = true;

    google.script.run
      .withSuccessHandler(res => {
          if(res.status === 'success') {
              if(document.getElementById(modalId)) document.getElementById(modalId).remove();
              sysShowToast(res.message, 'success');
              renderWorkspace_LogPribadi(); // Refresh UI
          } else {
              sysShowToast(res.message, 'error');
              btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> Simpan & Update ST'; 
              btn.disabled = false;
          }
      })
      .withFailureHandler(err => {
          // ANTI LOADING ABADI: Menangkap error jaringan atau server crash
          console.error("GAS System Error:", err);
          sysShowToast("System Failure: " + err.message, "error");
          btn.innerHTML = '<i class="fa-solid fa-cloud-arrow-up"></i> Simpan & Update ST'; 
          btn.disabled = false;
      })
      .api_userUpdateST(trxIds, newST, SysState.user);
}

// ==========================================================
// COMPONENT: PURE DOM INFO-SWIPER (GLASSMORPHISM)
// ==========================================================
const CEPU_InfoSwiper = {
    create: function(id, slides) {
        let currentSlide = 0;
        const containerId = `swiper-cont-${id}`;
        const trackId = `swiper-track-${id}`;

        const nextSlide = () => {
            currentSlide = (currentSlide + 1) % slides.length;
            const track = document.getElementById(trackId);
            if (track) track.style.transform = `translateX(-${currentSlide * 100}%)`;
            updateDots();
        };

        const updateDots = () => {
            slides.forEach((_, i) => {
                const dot = document.getElementById(`dot-${id}-${i}`);
                if (dot) dot.className = (i === currentSlide) ? 'w-4 h-1.5 bg-indigo-500 rounded-full transition-all duration-300' : 'w-1.5 h-1.5 bg-slate-300 rounded-full transition-all duration-300';
            });
        };

        // Auto-swipe interval 5 detik
        const interval = setInterval(() => {
            if (document.getElementById(containerId)) { nextSlide(); } else { clearInterval(interval); }
        }, 5000);

        const slideElements = slides.map((s, index) => {
            return DOM_Engine.create('div', 'min-w-full p-5 flex items-start gap-4', {}, [
                DOM_Engine.create('div', 'w-12 h-12 rounded-2xl bg-indigo-100 text-indigo-600 flex items-center justify-center shrink-0 shadow-sm', {}, [
                    DOM_Engine.create('i', `fa-solid ${s.icon} text-xl`)
                ]),
                DOM_Engine.create('div', 'flex-1', {}, [
                    DOM_Engine.create('h4', 'text-sm font-bold text-slate-800 mb-1', {}, [s.title]),
                    DOM_Engine.create('p', 'text-xs text-slate-500 leading-relaxed', {}, [s.content])
                ])
            ]);
        });

        const dots = slides.map((_, i) => DOM_Engine.create('div', i === 0 ? 'w-4 h-1.5 bg-indigo-500 rounded-full' : 'w-1.5 h-1.5 bg-slate-300 rounded-full', { id: `dot-${id}-${i}` }));

        return DOM_Engine.create('div', 'relative overflow-hidden bg-white/70 backdrop-blur-md border border-white rounded-[2rem] shadow-premium mb-6 fade-in group', { id: containerId }, [
            // Close Button
            DOM_Engine.create('button', 'absolute top-3 right-3 z-10 w-8 h-8 flex items-center justify-center rounded-full hover:bg-rose-100 text-slate-400 hover:text-rose-500 transition-all', {
                onClick: () => { clearInterval(interval); document.getElementById(containerId).remove(); }
            }, [DOM_Engine.create('i', 'fa-solid fa-times text-xs')]),
            
            // Sliding Track
            DOM_Engine.create('div', 'flex transition-transform duration-700 ease-in-out', { id: trackId, style: 'transform: translateX(0%);' }, slideElements),
            
            // Dots Navigation
            DOM_Engine.create('div', 'flex justify-center gap-1.5 pb-4', {}, dots)
        ]);
    }
};
