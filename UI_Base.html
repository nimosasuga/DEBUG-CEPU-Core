  <style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
    
    /* ========================================================= */
    /* [ABSOLUTE LOCK]: MENCEGAH HORIZONTAL SCROLL DI SEMUA HP   */
    /* ========================================================= */
    html, body { 
        font-family: 'Plus Jakarta Sans', sans-serif; 
        max-width: 100% !important;
        overflow-x: hidden !important;
        position: relative;
        overscroll-behavior-x: none !important; /* Mematikan efek mantul/karet saat digeser ke samping */
        touch-action: pan-y !important; /* Touchscreen hanya diizinkan untuk scroll atas-bawah */
    }
    
    /* Aurora Background Effect */
    .bg-aurora {
        background: radial-gradient(circle at 0% 0%, #eff6ff 0%, transparent 50%),
                    radial-gradient(circle at 100% 0%, #f5f3ff 0%, transparent 50%),
                    radial-gradient(circle at 100% 100%, #f0fdf4 0%, transparent 50%),
                    radial-gradient(circle at 0% 100%, #fff7ed 0%, transparent 50%);
        background-color: #f8fafc;
    }

    .glass {
        background: rgba(255, 255, 255, 0.7);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.3);
    }

    .glass-dark {
        background: rgba(15, 23, 42, 0.8);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .shadow-premium {
        box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
    }

    .input-premium {
        @apply bg-white/50 border-slate-200 focus:border-indigo-500 focus:ring-4 focus:ring-indigo-500/10 transition-all duration-300 rounded-2xl;
    }

    .btn-glow-indigo {
        background: linear-gradient(135deg, #6366f1 0%, #4338ca 100%);
        box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
    }

    .btn-glow-indigo:hover {
        box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.4);
        transform: translateY(-2px);
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }

    @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-10px); }
        100% { transform: translateY(0px); }
    }
    .animate-float { animation: float 6s ease-in-out infinite; }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 antialiased overflow-x-hidden w-full relative">

    </div>
